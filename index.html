<!DOCTYPE html>
<html>
<head>
    <title>My Special Proposal 💖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: gradientBG 8s infinite alternate;
            background: linear-gradient(45deg, #ff6ec4, #7873f5, #ff9a9e, #fad0c4);
            background-size: 400% 400%;
        }

        @keyframes gradientBG {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 0 30px rgba(255, 0, 150, 0.6);
        }

        h1 {
            font-size: 45px;
            color: white;
            text-shadow: 0 0 20px pink;
            margin-bottom: 30px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff; }
            to { text-shadow: 0 0 30px #ff4da6; }
        }

        input {
            padding: 15px;
            width: 250px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 18px;
            text-align: center;
        }

        button {
            margin-top: 20px;
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            background: linear-gradient(45deg, #ff4da6, #ff1e56);
            color: white;
            box-shadow: 0 0 20px #ff4da6;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff1e56;
        }

        #message {
            margin-top: 30px;
            font-size: 35px;
            color: white;
            display: none;
        }

        .floating {
            position: absolute;
            font-size: 25px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>💖 Enter Your Beautiful Name 💖</h1>
    <input type="text" id="nameInput" placeholder="Your Name">
    <br>
    <button onclick="propose()">Open My Heart ❤️</button>
    <div id="message"></div>
</div>

<script>
    function propose() {
        let name = document.getElementById("nameInput").value;
        if (name === "") {
            alert("Please enter your name 💕");
            return;
        }

        let message = document.getElementById("message");
        message.style.display = "block";
        message.innerHTML = "🌹 " + name + ", Will You Be Mine Forever? 💍🫶";

        createFloating();
    }

    function createFloating() {
        const items = ["❤️", "🌸", "🌹", "🌺", "💖", "💐","🥰","💕"];

        setInterval(() => {
            let float = document.createElement("div");
            float.className = "floating";
            float.innerHTML = items[Math.floor(Math.random() * items.length)];
            float.style.left = Math.random() * 100 + "vw";
            float.style.fontSize = (20 + Math.random() * 40) + "px";
            document.body.appendChild(float);

            setTimeout(() => {
                float.remove();
            }, 6000);
        }, 300);
    }
</script>

</body>
</html>
